# Property Manager — Docker Compose stack.
#
# Default (lean) stack:  docker compose up -d            -> app + db + worker
# With self-hosted IdP:  docker compose --profile idp up -d        (adds Authentik)
# With object storage:   docker compose --profile storage up -d    (adds MinIO, Phase 2)
# With bundled TLS proxy:docker compose --profile proxy up -d      (adds Caddy)
#
# Most operators run their own reverse proxy (e.g. Caddy) and terminate TLS there,
# forwarding to app:3000 with X-Forwarded-Proto=https. See docs/DEPLOYMENT.md.

x-app-env: &app-env
  DATABASE_URL: "postgresql://${POSTGRES_USER:-pm}:${POSTGRES_PASSWORD:-pm}@db:5432/${POSTGRES_DB:-property_manager}?schema=public"
  APP_URL: "${APP_URL:-http://localhost:3000}"
  # Pin Auth.js to the public URL. Without this, trustHost derives the OAuth
  # redirect_uri from per-request headers, which breaks the OIDC token exchange
  # (redirect_uri mismatch) when any hop rewrites Host.
  AUTH_URL: "${APP_URL:-http://localhost:3000}"
  AUTH_SECRET: "${AUTH_SECRET:?set AUTH_SECRET in .env (run: npm run bootstrap)}"
  AUTH_TRUST_HOST: "true"
  SETTINGS_ENC_KEY: "${SETTINGS_ENC_KEY:?set SETTINGS_ENC_KEY in .env (run: npm run bootstrap)}"
  SETUP_BOOTSTRAP_TOKEN: "${SETUP_BOOTSTRAP_TOKEN:-}"
  TRUSTED_PROXY_COUNT: "${TRUSTED_PROXY_COUNT:-1}"
  OIDC_SCOPES: "${OIDC_SCOPES:-openid email profile}"
  # Compose default is "local": uploads land in the named volume below and
  # survive rebuilds. (The bare-code default stays "stub" for tooling.)
  STORAGE_PROVIDER: "${STORAGE_PROVIDER:-local}"
  # Keep this in sync with the `uploads` volume mount on app/worker — files
  # written anywhere else live in the container layer and are LOST on rebuild.
  LOCAL_STORAGE_DIR: "${LOCAL_STORAGE_DIR:-/data/uploads}"
  STORAGE_ENCRYPT: "${STORAGE_ENCRYPT:-false}"
  STORAGE_ENC_KEY: "${STORAGE_ENC_KEY:-}"
  S3_ENDPOINT: "${S3_ENDPOINT:-}"
  S3_REGION: "${S3_REGION:-}"
  S3_BUCKET: "${S3_BUCKET:-}"
  S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
  S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
  S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-true}"
  SMS_PROVIDER: "${SMS_PROVIDER:-stub}"
  SMS_ACCOUNT_SID: "${SMS_ACCOUNT_SID:-}"
  SMS_AUTH_TOKEN: "${SMS_AUTH_TOKEN:-}"
  SMS_FROM_NUMBER: "${SMS_FROM_NUMBER:-}"
  REMINDER_DUE_SOON_DAYS: "${REMINDER_DUE_SOON_DAYS:-3}"
  OCR_ENABLED: "${OCR_ENABLED:-false}"
  OCR_PROVIDER: "${OCR_PROVIDER:-}"
  DEFAULT_TIMEZONE: "${DEFAULT_TIMEZONE:-America/New_York}"
  DEFAULT_CURRENCY: "${DEFAULT_CURRENCY:-USD}"

# One image serves both app and worker. Default is a locally-built tag; set
# APP_IMAGE to a registry ref (published by .github/workflows/docker-publish.yml)
# to run a pulled image — pin a sha-/version tag for production rather than
# :latest, so rollouts are deliberate and rollbacks are possible:
#   APP_IMAGE=ghcr.io/<owner>/property-manager:sha-<commit>
#   docker compose pull app worker && docker compose up -d
x-app-image: &app-image
  image: "${APP_IMAGE:-property-manager:local}"
  build: .

# Bounded JSON logs so containers can never fill the host disk.
x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

# Security defaults — applied to every service via <<: *security.
# no-new-privileges stops a process from gaining privileges through setuid/
# setgid binaries, so a compromised container can't escalate that way.
x-security: &security
  security_opt:
    - no-new-privileges:true

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    <<: [*logging, *security]
    mem_limit: "${DB_MEM_LIMIT:-1g}"
    mem_reservation: 256m
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-pm}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-pm}"
      POSTGRES_DB: "${POSTGRES_DB:-property_manager}"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pm} -d ${POSTGRES_DB:-property_manager}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    # merge-key with a list merges both anchors in order (Compose v2 supports this)
    <<: [*app-image, *logging, *security]
    restart: unless-stopped
    mem_limit: "${APP_MEM_LIMIT:-1g}"
    mem_reservation: 256m
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "1"
      SEED_ON_START: "${SEED_ON_START:-false}"
    ports:
      - "${APP_BIND:-0.0.0.0}:${APP_PORT:-3000}:3000"
    volumes:
      - uploads:/data/uploads
    # /api/health is unauthenticated and returns only {ok}; start_period covers
    # the migration run on boot.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    command: ["npm", "run", "start"]

  worker:
    # merge-key with a list merges both anchors in order (Compose v2 supports this)
    <<: [*app-image, *logging, *security]
    restart: unless-stopped
    mem_limit: "${WORKER_MEM_LIMIT:-512m}"
    mem_reservation: 128m
    depends_on:
      db:
        condition: service_healthy
      # healthy (not just started): the app applies migrations on boot, so this
      # also guarantees the worker never runs against an unmigrated schema.
      app:
        condition: service_healthy
    environment:
      <<: *app-env
      # Hourly so rent charges mint within ~1h of midnight in each property's
      # timezone (a daily UTC cron delays the 1st's charges for behind-UTC tz).
      # Idempotent, so hourly is safe. Override to taste (e.g. "0 1 * * *").
      BILLING_CRON: "${BILLING_CRON:-0 * * * *}"
      REMINDER_CRON: "${REMINDER_CRON:-0 9 * * *}"
      STAFF_DIGEST_CRON: "${STAFF_DIGEST_CRON:-0 9 * * 1}"
    volumes:
      - uploads:/data/uploads
    command: ["npm", "run", "worker"]

  # --- Authentik (profile: idp) -------------------------------------------
  authentik-db:
    image: postgres:17-alpine
    profiles: ["idp"]
    restart: unless-stopped
    <<: *security
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: "${AUTHENTIK_PG_PASS:-authentik}"
      POSTGRES_DB: authentik
    volumes:
      - authentik-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 5s
      timeout: 5s
      retries: 10

  authentik-redis:
    image: redis:7-alpine
    profiles: ["idp"]
    restart: unless-stopped
    <<: *security
    volumes:
      - authentik-redis:/data

  authentik-server:
    image: "ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.2}"
    profiles: ["idp"]
    restart: unless-stopped
    <<: *security
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY:-change-me-authentik-secret}"
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: "${AUTHENTIK_PG_PASS:-authentik}"
      AUTHENTIK_REDIS__HOST: authentik-redis
    ports:
      - "${AUTHENTIK_PORT:-9000}:9000"
      - "${AUTHENTIK_PORT_HTTPS:-9443}:9443"
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_started

  authentik-worker:
    image: "ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.2}"
    profiles: ["idp"]
    restart: unless-stopped
    <<: *security
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY:-change-me-authentik-secret}"
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: "${AUTHENTIK_PG_PASS:-authentik}"
      AUTHENTIK_REDIS__HOST: authentik-redis
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_started

  # --- MinIO object storage (profile: storage, Phase 2) -------------------
  minio:
    image: minio/minio:latest
    profiles: ["storage"]
    restart: unless-stopped
    <<: *security
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${S3_ACCESS_KEY_ID:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${S3_SECRET_ACCESS_KEY:-minioadmin}"
    ports:
      - "${MINIO_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - minio-data:/data

  # --- Bundled Caddy reverse proxy (profile: proxy) -----------------------
  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    restart: unless-stopped
    <<: *security
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  db-data:
  uploads:
  authentik-db:
  authentik-redis:
  minio-data:
  caddy-data:
  caddy-config:
