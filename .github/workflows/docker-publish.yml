# Builds the app/worker Docker image and publishes it to GitHub Container
# Registry on every push to main (:latest + :sha-<commit>) and on version tags
# (:X.Y.Z). Deploy hosts can then run a pulled image instead of building:
#
#   # in .env:  APP_IMAGE=ghcr.io/<owner>/<repo>:latest
#   docker compose pull app worker && docker compose up -d
#
# Uses the repo-scoped GITHUB_TOKEN — no extra secrets to configure. The
# package appears under the repo's "Packages"; keep it private or make it
# public from the package settings.
name: docker-publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases this automatically (ghcr requirement)
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
